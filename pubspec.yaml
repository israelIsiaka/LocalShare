name: localshare
description: "Fast, private file sharing over your local WiFi network. No internet, no accounts, no cloud."
publish_to: 'none'
version: 1.0.0+1
# TODO: set these to your actual repository once hosted
homepage: https://github.com/localshare-app/localshare
repository: https://github.com/localshare-app/localshare
issue_tracker: https://github.com/localshare-app/localshare/issues

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  http: ^1.2.2
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  network_info_plus: ^6.1.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  open_filex: ^4.5.0
  mime: ^2.0.0
  provider: ^6.1.2
  share_plus: ^10.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
