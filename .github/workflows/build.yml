name: Build & Release

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']          # e.g. v1.2.3 — triggers the release job
  pull_request:
    branches: [main, master]
  workflow_dispatch:          # allow manual runs from the Actions tab

# ─── Global env ──────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.x'     # keeps up with stable 3.x releases automatically

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Static analysis (fast feedback on every push / PR) ──────────────────
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  # ── 2. Android ─────────────────────────────────────────────────────────────
  android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Create key.properties from secrets (only present when secrets are set).
      # Without this file the app is signed with the debug key (still installable
      # for testing). Configure the four secrets in Settings → Secrets to enable
      # release signing.
      - name: Setup Android signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
          cat > android/key.properties <<EOF
          storeFile=../keystore.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── 3. iOS ─────────────────────────────────────────────────────────────────
  ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # Build without code signing — verifies the project compiles cleanly.
      # For a distributable IPA you need an Apple Developer account:
      # add IOS_CERTIFICATE_BASE64, IOS_CERTIFICATE_PASSWORD, and
      # IOS_PROVISIONING_PROFILE_BASE64 secrets, then swap --no-codesign
      # for proper export options. See docs/ci-signing.md for instructions.
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Archive .app
        run: |
          cd build/ios/iphoneos
          zip -r LocalShare-iOS.zip Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/LocalShare-iOS.zip
          retention-days: 30

  # ── 4. macOS ───────────────────────────────────────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Archive macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r LocalShare-macOS.zip LocalShare.app

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/LocalShare-macOS.zip
          retention-days: 30

  # ── 5. Windows ─────────────────────────────────────────────────────────────
  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows build
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "LocalShare-Windows.zip"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: LocalShare-Windows.zip
          retention-days: 30

  # ── 6. GitHub Release (only on version tags) ───────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write       # needed to create the release
    steps:
      - uses: actions/checkout@v4

      # Download every artifact from the build jobs into separate folders
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Flatten the folder structure so all files sit at the top level
      - name: Collect release assets
        run: |
          mkdir release-assets
          find artifacts -type f | while read f; do
            cp "$f" release-assets/
          done
          ls -lh release-assets/

      # Read version from pubspec.yaml for the release title
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalShare ${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → pre-release
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
